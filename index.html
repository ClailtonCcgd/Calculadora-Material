<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Calculadora de Material</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 50px;
      background: #f4f4f4;
    }
    .box {
      background: white;
      padding: 20px;
      border-radius: 10px;
      display: inline-block;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    input {
      margin: 10px;
      padding: 10px;
      width: 200px;
    }
    button {
      padding: 10px 20px;
      background: #28a745;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }
    h2 {
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <div class="box">
    <h1>Calculadora de Material</h1>

    <input type="number" id="metragem" placeholder="Metragem (m²)">
    <br>
    <input type="number" id="valor" placeholder="Valor por m²">
    <br>
    <input type="number" id="quantidade" placeholder="Quantidade">
    <br>

    <button onclick="calcular()">Calcular</button>

    <h2 id="resultado"></h2>
  </div>

  <script>
    function calcular() {
      let metragem = parseFloat(document.getElementById("metragem").value);
      let valor = parseFloat(document.getElementById("valor").value);
      let quantidade = parseFloat(document.getElementById("quantidade").value);

      if (!metragem || !valor || !quantidade) {
        document.getElementById("resultado").innerText = "Preencha todos os campos!";
        return;
      }

      let total = metragem * valor * quantidade;

      document.getElementById("resultado").innerText =
        "Total: R$ " + total.toFixed(2);
    }
  </script>

</body>
</html>
