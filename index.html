<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Calculadora de Material</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 50px;
      background: #f4f4f4;
    }
    .box {
      background: white;
      padding: 20px;
      border-radius: 10px;
      display: inline-block;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    input, select {
      margin: 10px;
      padding: 10px;
      width: 220px;
    }
    button {
      padding: 10px 20px;
      background: #28a745;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }
  </style>
</head>

<body>

<div class="box">
  <h1>Calculadora</h1>

  <select id="tipo" onchange="mostrarCampos()">
    <option value="">Escolha o tipo</option>
    <option value="pvc">PVC</option>
    <option value="ceramica">Cerâmica</option>
  </select>

  <!-- PVC -->
  <div id="pvcCampos" style="display:none;">
    <h3>PVC</h3>

    <input type="number" id="largura" placeholder="Largura (m)">
    <br>
    <input type="number" id="comprimento" placeholder="Comprimento (m)">
    <br>
    <input type="number" id="valorMetro" placeholder="Valor do m²">
    <br>

    <h4>Perfil</h4>
    <input type="number" id="qtdPerfil" placeholder="Quantidade de perfil">
    <br>
    <input type="number" id="valorPerfil" placeholder="Valor do perfil">
    <br>

    <h4>Parafusos</h4>
    <input type="number" id="metragemParafuso" placeholder="Metragem total (m)">
  </div>

  <!-- CERÂMICA NOVA -->
  <div id="ceramicaCampos" style="display:none;">
    <h3>Cerâmica</h3>

    <input type="number" id="larguraCeramica" placeholder="Largura (m)">
    <br>
    <input type="number" id="comprimentoCeramica" placeholder="Comprimento (m)">
    <br>
    <input type="number" id="m2Caixa" placeholder="m² por caixa">
    <br>
    <input type="number" id="valorCeramica" placeholder="Valor do m²">
  </div>

  <br>
  <button onclick="calcular()">Calcular</button>

  <h2 id="resultado"></h2>
</div>

<script>
function mostrarCampos() {
  let tipo = document.getElementById("tipo").value;

  document.getElementById("pvcCampos").style.display = "none";
  document.getElementById("ceramicaCampos").style.display = "none";

  if (tipo === "pvc") {
    document.getElementById("pvcCampos").style.display = "block";
  }

  if (tipo === "ceramica") {
    document.getElementById("ceramicaCampos").style.display = "block";
  }
}

function calcular() {
  let tipo = document.getElementById("tipo").value;
  let resultado = "";

  if (tipo === "pvc") {
    let largura = parseFloat(document.getElementById("largura").value);
    let comprimento = parseFloat(document.getElementById("comprimento").value);
    let valorMetro = parseFloat(document.getElementById("valorMetro").value);

    let metragem = largura * comprimento;
    let totalMaterial = metragem * valorMetro;

    let qtdPerfil = parseFloat(document.getElementById("qtdPerfil").value) || 0;
    let valorPerfil = parseFloat(document.getElementById("valorPerfil").value) || 0;
    let totalPerfil = qtdPerfil * valorPerfil;

    let metragemParafuso = parseFloat(document.getElementById("metragemParafuso").value) || 0;
    let parafusos = metragemParafuso * 15;

    let totalGeral = totalMaterial + totalPerfil;

    resultado = `
      Metragem: ${metragem.toFixed(2)} m² <br>
      Material: R$ ${totalMaterial.toFixed(2)} <br>
      Perfil: R$ ${totalPerfil.toFixed(2)} <br>
      Parafusos: ${parafusos} unidades <br>
      <strong>Total: R$ ${totalGeral.toFixed(2)}</strong>
    `;
  }

  if (tipo === "ceramica") {
    let largura = parseFloat(document.getElementById("larguraCeramica").value);
    let comprimento = parseFloat(document.getElementById("comprimentoCeramica").value);
    let m2Caixa = parseFloat(document.getElementById("m2Caixa").value);
    let valor = parseFloat(document.getElementById("valorCeramica").value);

    let area = largura * comprimento;
    let areaComSobra = area * 1.10; // +10%
    let caixas = Math.ceil(areaComSobra / m2Caixa);
    let total = areaComSobra * valor;

    resultado = `
      Área: ${area.toFixed(2)} m² <br>
      Área com sobra: ${areaComSobra.toFixed(2)} m² <br>
      Caixas necessárias: ${caixas} <br>
      <strong>Total: R$ ${total.toFixed(2)}</strong>
    `;
  }

  document.getElementById("resultado").innerHTML = resultado;
}
</script>

</body>
</html>
